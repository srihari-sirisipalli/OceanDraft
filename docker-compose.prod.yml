# Production-style compose. Still single-host but suitable for a VPS.
# Fronted by any HTTPS terminator (Caddy, Traefik, Nginx, Cloudflare Tunnel).
#
# Usage:
#   cp .env.example .env.prod   # fill real secrets, set OTP_DEV_MODE=false
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ocean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocean}
      POSTGRES_DB: ${POSTGRES_DB:-oceandraft}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ocean}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-miniosecret}
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minio} ${S3_SECRET_KEY:-miniosecret} &&
      mc mb -p local/${S3_BUCKET:-oceandraft-media} || true &&
      exit 0
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ocean}:${POSTGRES_PASSWORD:-ocean}@postgres:5432/${POSTGRES_DB:-oceandraft}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-oceandraft-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-miniosecret}
      S3_FORCE_PATH_STYLE: "true"
      SMS_PROVIDER: ${SMS_PROVIDER:-msg91}
      OTP_DEV_MODE: ${OTP_DEV_MODE:-false}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM: ${TWILIO_FROM}
      SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${APP_BASE_URL:-http://localhost:3000}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@oceandraft.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_BRAND_NAME: OceanDraft
    ports:
      - "3000:3000"

volumes:
  pg-data:
  redis-data:
  minio-data:
